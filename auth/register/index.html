<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="description" content="Register | Sci-Fi HUD Portal" />
  <meta name="theme-color" content="#05070f" />
  <meta name="color-scheme" content="dark" />
  <title>Register | HUD Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            night: "#05070f",
            panel: "#091322",
            cyanx: "#2af6ff",
            magx: "#ff3a98",
            violetx: "#9657ff"
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-night text-slate-200" data-theme="dark_cyan">
  <div class="hud-loader" id="hudLoader" role="status" aria-live="polite">
    <div class="hud-loader-core">
      <div class="loader-ring"></div>
      <div class="loader-ring loader-ring-alt"></div>
      <p class="font-['Orbitron'] text-cyanx tracking-[0.15em] text-sm">REGISTRATION INITIATED</p>
      <p id="loaderStatus" class="text-slate-300 mt-2 text-sm">Processing...</p>
    </div>
  </div>

  <div class="auth-grid" aria-hidden="true"></div>

  <main class="auth-main">
    <div class="auth-container">
      <div class="auth-card">
        <div class="electric-frame auth-frame">
          <div class="auth-content">
            <div class="text-center mb-6">
              <p class="font-['Orbitron'] text-magx tracking-[0.25em] text-xs uppercase">New Authorization</p>
              <h1 class="font-['Orbitron'] text-2xl sm:text-3xl font-bold mt-3 text-white">Register</h1>
            </div>

            <form id="registerForm" class="space-y-4">
              <div class="form-group">
                <label for="regUsername" class="form-label">Username</label>
                <input type="text" id="regUsername" name="username" class="form-input" placeholder="Choose username" required autocomplete="username" />
                <div class="input-scan"></div>
                <p id="usernameFeedback" class="text-xs mt-1.5 h-4 px-1"></p>
              </div>

              <div class="form-group">
                <label for="regEmail" class="form-label">Email Address</label>
                <input type="email" id="regEmail" name="email" class="form-input" placeholder="your@email.com" required autocomplete="email" />
                <div class="input-scan"></div>
                <p id="emailFeedback" class="text-xs mt-1.5 h-4 px-1"></p>
              </div>

              <div class="form-group">
                <label for="regPassword" class="form-label">Password</label>
                <div class="password-wrapper">
                  <input type="password" id="regPassword" name="password" class="form-input" placeholder="Create password" required autocomplete="new-password" />
                  <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
                <div class="input-scan"></div>
                <p id="passwordStrength" class="text-xs mt-1.5 h-4 px-1"></p>
                <div id="passwordCriteria" class="mt-2 space-y-1 hidden">
                  <div class="flex items-center gap-2 text-xs">
                    <span id="criteriaLength" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                    <span class="text-slate-400">8+ characters</span>
                  </div>
                  <div class="flex items-center gap-2 text-xs">
                    <span id="criteriaNumber" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                    <span class="text-slate-400">Contains number</span>
                  </div>
                  <div class="flex items-center gap-2 text-xs">
                    <span id="criteriaSpecial" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                    <span class="text-slate-400">Special character</span>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label for="regConfirmPassword" class="form-label">Confirm Password</label>
                <div class="password-wrapper">
                  <input type="password" id="regConfirmPassword" name="confirmPassword" class="form-input" placeholder="Confirm password" required autocomplete="new-password" />
                  <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
                <div class="input-scan"></div>
                <p id="confirmFeedback" class="text-xs mt-1.5 h-4 px-1"></p>
              </div>

              <div class="form-options">
                <label class="checkbox-label">
                  <input type="checkbox" name="terms" class="checkbox-input" required />
                  <span class="checkbox-custom"></span>
                  <span>I agree to the terms</span>
                </label>
              </div>

              <button type="submit" class="hud-btn auth-submit w-full">
                <span class="btn-text">Create Account</span>
                <span class="btn-loader"></span>
              </button>
            </form>

            <div class="auth-divider">
              <span class="divider-line"></span>
              <span class="divider-text">or continue with</span>
              <span class="divider-line"></span>
            </div>

            <div class="social-login">
              <button type="button" class="social-btn google" aria-label="Sign up with Google">
                <svg class="social-icon" viewBox="0 0 48 48">
                  <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                  <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                  <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                  <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                  <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                <span>Google</span>
              </button>

              <button type="button" class="social-btn github" aria-label="Sign up with GitHub">
                <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                <span>GitHub</span>
              </button>

              <button type="button" class="social-btn facebook" aria-label="Sign up with Facebook">
                <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                <span>Facebook</span>
              </button>

              <button type="button" class="social-btn twitter" aria-label="Sign up with Twitter">
                <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                <span>Twitter</span>
              </button>
            </div>

            <p class="text-center text-sm text-slate-400 mt-6">
              Already have access? 
              <a href="../login/" class="text-cyanx hover:text-magx transition-colors font-semibold">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
